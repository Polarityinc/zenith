# cargo-deny configuration. Keeps the supply chain auditable: only
# permissive licenses, no duplicated crate versions in the build graph,
# no advisories beyond what we've explicitly accepted.

[graph]
all-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "OpenSSL",
]
confidence-threshold = 0.85

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
