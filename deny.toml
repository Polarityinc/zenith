# cargo-deny configuration. Keeps the supply chain auditable: only
# permissive licenses, no duplicated crate versions in the build graph,
# no advisories beyond what we've explicitly accepted.

[graph]
all-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Mirror of audit.toml. Each entry must have a justification in that
# file; re-evaluate whenever the upstream lockfile changes meaningfully.
ignore = [
    "RUSTSEC-2023-0071",  # rsa (sqlx-mysql, not compiled)
    "RUSTSEC-2025-0141",  # bincode unmaintained
    "RUSTSEC-2024-0384",  # instant unmaintained (transitive via tantivy)
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained
    "RUSTSEC-2026-0002",  # lru unsound (transitive via tantivy)
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  # webpki-roots (Mozilla root CA bundle) ships under CDLA-Permissive-2.0.
  # OSI-permissive, no copyleft. Required by rustls.
  "CDLA-Permissive-2.0",
  # xxhash-rust uses Boost Software License 1.0 — permissive, OSI-approved.
  "BSL-1.0",
]
confidence-threshold = 0.85

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[sources]
unknown-registry = "deny"
# Reject any unknown git source. Catches accidental Cargo.lock edits
# pulling code from a malicious git repo (supply-chain attack vector).
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
