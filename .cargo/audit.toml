# cargo-audit configuration.
#
# Each ignored advisory below has a written-out reason. Re-evaluate
# any time a major dep bump lands or once a year, whichever comes first.

[advisories]
ignore = [
    # sqlx-mysql pulls rsa 0.9.x; we configure sqlx with default-features=false
    # and only enable the "postgres" feature, so sqlx-mysql is in the lockfile
    # but never compiled into our binary. The Marvin Attack requires an
    # attacker to issue many timing-measured RSA operations against the
    # process — that surface doesn't exist in zenithdb. Revisit when a fix is
    # released upstream.
    "RUSTSEC-2023-0071",

    # bincode 1.x is unmaintained; 2.x is a breaking change. We use it only
    # for stable on-disk segment footers (zen_format), which we own end-to-end.
    # No CVE; switching codecs is on the roadmap but not urgent.
    "RUSTSEC-2025-0141",

    # `instant` is unmaintained; pulled transitively by tantivy 0.22 via
    # measure_time. Replacement (`web-time`) requires a tantivy bump, which is
    # a much bigger change. No security impact — instant is a time helper.
    "RUSTSEC-2024-0384",

    # rustls-pemfile 2.x is unmaintained per RUSTSEC, but rustls itself has
    # absorbed the PEM helpers it provided. We'll drop the dep when we move
    # to rustls 0.24 internals. No security impact today.
    "RUSTSEC-2025-0134",

    # lru 0.12 (transitive through tantivy) has an unsound IterMut. We do not
    # call IterMut from tantivy's usage of lru, and tantivy 0.22 is what we
    # ship. Upstream fix is in lru 0.13; will pick it up with the next tantivy
    # bump.
    "RUSTSEC-2026-0002",
]
