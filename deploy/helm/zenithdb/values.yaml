image:
  repository: ghcr.io/polarity-cc/zenithdb
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 50051

resources:
  limits:
    memory: 8Gi
    cpu: 4
  requests:
    memory: 2Gi
    cpu: 1

# NVMe-backed PVC for the page cache.
nvmeCache:
  enabled: true
  size: 200Gi
  storageClass: local-nvme

# Catalog
catalog:
  backend: postgres
  postgresUrl: postgres://zen:zen@postgres:5432/zenith

# Object storage
storage:
  backend: s3
  bucket: zenithdb-prod
  region: us-east-1
  endpoint: ""

# Pod scheduling protection — keep at least one replica live during
# voluntary disruptions (node drains, kubectl rollouts).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Horizontal scaling on CPU + memory pressure.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Network segmentation — default-deny with explicit ingress allowances.
# Operators MUST set `allowFromNamespaces` (typically the LB / monitoring
# namespaces) and `allowEgressCidrs` (S3 / Postgres / IdP) for the policy
# to be useful.
networkPolicy:
  enabled: false
  allowFromNamespaces: []
  allowEgressCidrs: []

# IRSA / Workload Identity binding goes here. We default to
# `automountToken: false` because Zenith doesn't talk to the K8s API.
serviceAccount:
  create: true
  name: ""
  automountToken: false
  annotations: {}
  # Example for AWS IRSA:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/zenithdb-s3-kms

# Ingress (optional — most users put a load balancer in front instead).
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []
