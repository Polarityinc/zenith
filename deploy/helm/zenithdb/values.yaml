image:
  repository: ghcr.io/polarity-cc/zenithdb
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 50051

resources:
  limits:
    memory: 8Gi
    cpu: 4
  requests:
    memory: 2Gi
    cpu: 1

# NVMe-backed PVC for the page cache.
nvmeCache:
  enabled: true
  size: 200Gi
  storageClass: local-nvme

# Catalog
catalog:
  backend: postgres
  postgresUrl: postgres://zen:zen@postgres:5432/zenith

# Object storage
storage:
  backend: s3
  bucket: zenithdb-prod
  region: us-east-1
  endpoint: ""
