image:
  repository: ghcr.io/Polarityinc/zenith
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 50051

resources:
  limits:
    memory: 8Gi
    cpu: 4
  requests:
    memory: 2Gi
    cpu: 1

# NVMe-backed PVC for the page cache.
nvmeCache:
  enabled: true
  size: 200Gi
  storageClass: local-nvme

# Catalog. NEVER hard-code credentials in values.yaml. Provide them via
# an external Secret + envFrom, an ESO ExternalSecret, or a SecretStore
# CSI mount. The default below points at a Secret named `<release>-db`
# with key `url` (containing the full postgres:// connection string).
catalog:
  backend: postgres
  # Empty by default. The deployment template wires
  # POSTGRES_URL=valueFrom.secretKeyRef so the password never appears
  # in pod specs, etcd, or `kubectl describe` output.
  existingSecret: ""        # e.g. "zenith-db" — Secret with key "url"
  existingSecretKey: "url"

# Object storage
storage:
  backend: s3
  bucket: zenithdb-prod
  region: us-east-1
  endpoint: ""

# Pod scheduling protection — keep at least one replica live during
# voluntary disruptions (node drains, kubectl rollouts).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Horizontal scaling on CPU + memory pressure.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Network segmentation — default-deny with explicit ingress allowances.
# Operators MUST set `allowFromNamespaces` (typically the LB / monitoring
# namespaces) and `allowEgressCidrs` (S3 / Postgres / IdP) for the policy
# to be useful.
networkPolicy:
  enabled: false
  allowFromNamespaces: []
  allowEgressCidrs: []

# IRSA / Workload Identity binding goes here. We default to
# `automountToken: false` because Zenith doesn't talk to the K8s API.
serviceAccount:
  create: true
  name: ""
  automountToken: false
  annotations: {}
  # Example for AWS IRSA:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/zenithdb-s3-kms

# Ingress (optional — most users put a load balancer in front instead).
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []
