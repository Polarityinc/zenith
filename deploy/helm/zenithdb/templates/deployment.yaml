apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: zenithdb
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: zenithdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zenithdb
    spec:
      containers:
        - name: zenithdb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          env:
            - name: ZEN_CATALOG_BACKEND
              value: {{ .Values.catalog.backend }}
            - name: ZEN_POSTGRES_URL
              value: {{ .Values.catalog.postgresUrl }}
            - name: ZEN_STORAGE_BACKEND
              value: {{ .Values.storage.backend }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.nvmeCache.enabled }}
          volumeMounts:
            - name: cache
              mountPath: /var/cache/zenithdb
          {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
      {{- if .Values.nvmeCache.enabled }}
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-cache
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
  selector:
    app.kubernetes.io/name: zenithdb
{{- if .Values.nvmeCache.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-cache
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.nvmeCache.size }}
  storageClassName: {{ .Values.nvmeCache.storageClass }}
{{- end }}
