# Optional "prod-like" profile for ZenithDB.
# Run with:  docker compose -f deploy/docker/docker-compose.dev.yml up -d
# Then start the server with ZEN_PROFILE=prod-like (postgres + minio).

services:
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: zen
      POSTGRES_PASSWORD: zen
      POSTGRES_DB: zenith
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: zen
      MINIO_ROOT_PASSWORD: zen-secret-password
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      sh -c "
        sleep 5;
        mc alias set local http://minio:9000 zen zen-secret-password;
        mc mb -p local/zenithdb || true;
      "

volumes:
  postgres-data:
  minio-data:
