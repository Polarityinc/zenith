# Optional "prod-like" profile for ZenithDB.
#
# Run with:  docker compose -f deploy/docker/docker-compose.dev.yml up -d
# Then start the server with ZEN_PROFILE=prod-like (postgres + minio).
#
# Credentials come from environment variables — there are no hard-coded
# defaults so a stray `git clone && docker compose up` on a public
# network can't expose the catalog. Set them in `.env` next to this
# file (the `.env` file is gitignored):
#
#   ZEN_DB_USER=zen
#   ZEN_DB_PASSWORD=<openssl rand -base64 32>
#   ZEN_DB_NAME=zenith
#   ZEN_MINIO_USER=zen
#   ZEN_MINIO_PASSWORD=<openssl rand -base64 32>

services:
  postgres:
    image: postgres:14.19-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ZEN_DB_USER:?ZEN_DB_USER is required}
      POSTGRES_PASSWORD: ${ZEN_DB_PASSWORD:?ZEN_DB_PASSWORD is required}
      POSTGRES_DB: ${ZEN_DB_NAME:-zenith}
    # Bind to loopback only — the dev stack is meant for the operator's
    # workstation, not network exposure.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2025-04-01T00-00-00Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${ZEN_MINIO_USER:?ZEN_MINIO_USER is required}
      MINIO_ROOT_PASSWORD: ${ZEN_MINIO_PASSWORD:?ZEN_MINIO_PASSWORD is required}
    volumes:
      - minio-data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-04-01T00-00-00Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ZEN_MINIO_USER: ${ZEN_MINIO_USER}
      ZEN_MINIO_PASSWORD: ${ZEN_MINIO_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$ZEN_MINIO_USER" "$$ZEN_MINIO_PASSWORD" &&
        mc mb -p local/zenithdb || true

volumes:
  postgres-data:
  minio-data:
